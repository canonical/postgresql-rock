name: Release to GHCR

on:
  push:
    branches:
      - '*-*.04'
    paths:
      - rockcraft.yaml
      - 'scripts/**'
  workflow_dispatch:

jobs:
  ci-tests:
    name: Tests
    uses: ./.github/workflows/ci.yaml
    permissions:
      actions: read  # Needed for GitHub API call to get workflow version
      contents: read

  release:
    name: Release rock
    needs:
      - ci-tests
    uses: canonical/data-platform-workflows/.github/workflows/release_rock_edge.yaml@v48.1.2
    with:
      artifact-prefix: ${{ needs.ci-tests.outputs.artifact-prefix }}
    permissions:
      actions: read  # Needed for GitHub API call to get workflow version
      packages: write  # Needed to publish to GitHub Container Registry
      contents: write  # Needed to create git tags

  oci-factory:
    name: Update OCI-Factory
    needs:
      - release
    runs-on: ubuntu-latest
    environment:
      name: oci-factory
      deployment: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Golang setup
        uses: actions/setup-go@v6
        with:
          go-version: ">=1.22.0"
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install git
          sudo apt install yq
          go install github.com/canonical/oci-factory/tools/cli-client/cmd/oci-factory@latest
      - name: Set binary paths to environment
        run: |
          echo OCI_FACTORY="$(go env GOPATH)/bin/oci-factory" >> "${GITHUB_ENV}"
      - name: Set image version to environment
        run: |
          {
            # https://github.com/canonical/product-architecture/blob/83a40ab40d1a35267fd03aa64222150f91ba0c2d/products-data/25.10/postgresql.json#L175
            echo END_OF_LIFE="2029-04-25"
            echo POSTGRESQL_MAJOR_VERSION="$(yq -r '(.version | tostring) | split(".")[0]' rockcraft.yaml)"
            echo OS_VERSION="$(yq -r '.base | split("@")[1]' rockcraft.yaml)"
          } >> "${GITHUB_ENV}"
      - name: Release
        run: |
          "${OCI_FACTORY}" upload -y --release \
            track="${POSTGRESQL_MAJOR_VERSION}-${OS_VERSION},eol=${END_OF_LIFE},risks=edge"
        env:
          GITHUB_TOKEN: ${{ secrets.DP_BOT_PAT_OCI_FACTORY }}
    permissions: {}

  sbom:
    name: Generate Software Bill of Materials
    needs:
      - ci-tests
      # Run after release so that rock cannot be (maliciously) modified between build & release
      - release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install Syft
        run: |
          gh release --repo anchore/syft download --pattern '*_linux_amd64.deb' --output syft.deb
          sudo apt-get install -y ./syft.deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Download rock package(s)
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ needs.ci-tests.outputs.artifact-prefix }}-*
          merge-multiple: true
      - name: Generate SBOM(s)
        shell: python
        run: |
          import pathlib
          import subprocess

          for rock_file in pathlib.Path(".").glob("*.rock"):
              subprocess.run(
                  ["syft", rock_file.name, "--output", f"spdx-json={rock_file.name}.spdx.json"],
                  check=True,
              )
      - name: Upload SBOM(s)
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ needs.ci-tests.outputs.artifact-prefix }}
          path: '*.spdx.json'
          if-no-files-found: error
    permissions: {}

  trivy:
    needs:
      # Checks the pushed tag
      - release
    name: Trivy Scan
    uses: ./.github/workflows/trivy.yaml
    permissions:
      security-events: write  # Required for uploading Trivy SARIF results
