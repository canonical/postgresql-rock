name: postgresql
base: bare
build-base: devel
version: '18.3'
summary: PostgreSQL rock OCI
description: |
    PostgreSQL built from the official PostgreSQL Ubuntu apt package.
    For more information on rocks, visit https://github.com/canonical/rockcraft.
license: Apache-2.0
platforms:
    amd64:
    arm64:
    riscv64:

environment:
    PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/lib/postgresql/18/bin"
    PGDATA: /var/lib/postgresql/data
    TZ: UTC

services:
    postgres:
        override: replace
        command: /usr/local/bin/entrypoint.sh postgres
        startup: enabled
        user: postgres
        group: postgres

parts:
    pre-postgres:
        plugin: nil
        override-build: |
            craftctl default

            # Needed for bare base
            # https://github.com/canonical/rockcraft/issues/193#issuecomment-1429594574
            mkdir $CRAFT_PART_INSTALL/etc
            chmod 755 $CRAFT_PART_INSTALL/etc

            # Create a user in the $CRAFT_PART_INSTALL chroot
            groupadd -R $CRAFT_PART_INSTALL -g 584788 postgres
            useradd -R $CRAFT_PART_INSTALL --create-home -r -g postgres -u 584788 postgres
    postgresql:
        plugin: dump
        after:
            - pre-postgres
        source: bld:postgresql
        source-channel: 18-26.04/edge
        stage-packages:
            - libicu78
            - libldap2
            - libxml2-16
            - libnuma1
            - liburing2
            - perl
            - libgssapi-krb5-2
            - libreadline-dev
            - liblz4-1
            - coreutils-from-uutils
            # set PG pager for psql to less
            - less
            - locales-all
            - tzdata
            - util-linux
            - dash
            - bash
            - findutils
        organize:
            usr/share/doc/coreutils/copyright: licenses/COPYRIGHT-coreutils
            usr/share/doc/less/copyright: license/COPYRIGHT-less
            usr/share/doc/locales-all/copyright: license/COPYRIGHT-locales-all
            usr/share/doc/tzdata/copyright: license/COPYRIGHT-tzdata
            usr/share/doc/util-linux/copyright: license/COPYRIGHT-util-linux
    pg-similarity:
        plugin: dump
        after:
            - pre-postgres
        source: bld:postgresql-similarity
        source-channel: 1-pg18-26.04/edge
        stage:
            - usr/share/
            - usr/lib/
    post-postgres:
        plugin: nil
        after:
            - postgresql
        override-build: |
            craftctl default
            mkdir -p $CRAFT_PART_INSTALL/var/lib/postgresql
            mkdir -p $CRAFT_PART_INSTALL/var/run/postgresql
            chown -R 584788 $CRAFT_PART_INSTALL/var/lib/postgresql
            chown -R 584788 $CRAFT_PART_INSTALL/var/run/postgresql
            # Docker entrypoint compatibility
            mkdir -p $CRAFT_PART_INSTALL/docker-entrypoint-initdb.d/
            # Remove the snakeoil self-signed certificate generated by the ssl-cert package
            rm -f $CRAFT_PART_INSTALL/etc/ssl/certs/ssl-cert-snakeoil.pem
            rm -f $CRAFT_PART_INSTALL/etc/ssl/private/ssl-cert-snakeoil.key
            # Generate dpkg.query
            mkdir -p $CRAFT_PART_INSTALL/usr/share/rocks
            echo "# os-release" > $CRAFT_PART_INSTALL/usr/share/rocks/dpkg.query
            echo "# dpkg-query" >> $CRAFT_PART_INSTALL/usr/share/rocks/dpkg.query
            declare -a fields
            fields+=('${db:Status-Abbrev}')
            fields+=('${binary:Package}')
            fields+=('${Version}')
            fields+=('${source:Package}')
            fields+=('${Source:Version}')
            printf -v dpkg_ops '%s,' "${fields[@]}"
            dpkg-query -W -f "${dpkg_ops}\n" --root=${CRAFT_PART_INSTALL} >> $CRAFT_PART_INSTALL/usr/share/rocks/dpkg.query
        override-prime: |
            craftctl default
            # Allow access to PostgreSQL
            sed -ri "s!^#?(listen_addresses)\s*=\s*\S+.*!\1 = '*'!" $CRAFT_PRIME/usr/share/postgresql/18/postgresql.conf.sample
    rock-entrypoint:
        plugin: dump
        source: .
        source-type: local
        stage:
            - usr/local/bin/
        organize:
            scripts/entrypoint.sh: /usr/local/bin/entrypoint.sh
    rock-license:
        plugin: dump
        source: .
        source-type: local
        stage:
            - licenses/LICENSE-rock
        organize:
            LICENSE: licenses/LICENSE-rock
