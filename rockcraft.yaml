name: postgres
base: ubuntu@24.04
version: '16.10'
summary: PostgreSQL rock OCI
description: |
    PostgreSQL built from the official PostgreSQL Ubuntu apt package.
    For more information on rocks, visit https://github.com/canonical/rockcraft.
license: Apache-2.0
platforms:
    amd64:
    arm64:

environment:
    PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/lib/postgresql/16/bin"
    PGDATA: /var/lib/postgresql/data
    TZ: UTC

services:
    postgres:
        override: replace
        command: sh -c "/usr/local/bin/entrypoint.sh postgres"
        startup: enabled
        user: postgres
        group: postgres

parts:
    pre-postgres:
        plugin: nil
        overlay-script: |
            craftctl default
            # Create a user in the $CRAFT_OVERLAY chroot
            groupadd -R $CRAFT_OVERLAY -g 584788 postgres
            useradd -R $CRAFT_OVERLAY --create-home -r -g postgres -u 584788 postgres
    postgres:
        plugin: nil
        after:
            - pre-postgres
        overlay-packages:
            - coreutils
            - gosu
            # set PG pager for psql to less
            - less
            - locales-all
            - postgresql
            - postgresql-16
            - postgresql-common
            - postgresql-client-16
            - postgresql-client-common
            - tzdata
            - util-linux
        overlay-script: |
            craftctl default
            mkdir -p $CRAFT_OVERLAY/licenses
            mv $CRAFT_OVERLAY/usr/share/doc/coreutils/copyright $CRAFT_OVERLAY/licenses/COPYRIGHT-coreutils
            mv $CRAFT_OVERLAY/usr/share/doc/gosu/copyright $CRAFT_OVERLAY/licenses/COPYRIGHT-gosu
            mv $CRAFT_OVERLAY/usr/share/doc/less/copyright $CRAFT_OVERLAY/licenses/COPYRIGHT-less
            mv $CRAFT_OVERLAY/usr/share/doc/locales-all/copyright $CRAFT_OVERLAY/licenses/COPYRIGHT-locales-all
            mv $CRAFT_OVERLAY/usr/share/doc/postgresql/copyright $CRAFT_OVERLAY/licenses/COPYRIGHT-postgresql
            mv $CRAFT_OVERLAY/usr/share/doc/postgresql-16/copyright $CRAFT_OVERLAY/licenses/COPYRIGHT-postgresql-16
            mv $CRAFT_OVERLAY/usr/share/doc/postgresql-common/copyright $CRAFT_OVERLAY/licenses/COPYRIGHT-postgresql-common
            mv $CRAFT_OVERLAY/usr/share/doc/postgresql-client-16/copyright $CRAFT_OVERLAY/licenses/COPYRIGHT-postgresql-client-16
            mv $CRAFT_OVERLAY/usr/share/doc/postgresql-client-common/copyright $CRAFT_OVERLAY/licenses/COPYRIGHT-postgresql-client-common
            mv $CRAFT_OVERLAY/usr/share/doc/tzdata/copyright $CRAFT_OVERLAY/licenses/COPYRIGHT-tzdata
            mv $CRAFT_OVERLAY/usr/share/doc/util-linux/copyright $CRAFT_OVERLAY/licenses/COPYRIGHT-util-linux
    post-postgres:
        plugin: nil
        after:
            - postgres
        overlay-script: |
            craftctl default
            mkdir -p $CRAFT_OVERLAY/var/lib/postgresql
            mkdir -p $CRAFT_OVERLAY/var/run/postgresql
            chown -R 584788 $CRAFT_OVERLAY/var/lib/postgresql
            chown -R 584788 $CRAFT_OVERLAY/var/run/postgresql
            # Docker entrypoint compatibility
            mkdir -p $CRAFT_OVERLAY/docker-entrypoint-initdb.d/
            # Allow access to PostgreSQL
            sed -ri "s!^#?(listen_addresses)\s*=\s*\S+.*!\1 = '*'!" $CRAFT_OVERLAY/usr/share/postgresql/16/postgresql.conf.sample
            # Remove the snakeoil self-signed certificate generated by the ssl-cert package
            rm -f $CRAFT_OVERLAY/etc/ssl/certs/ssl-cert-snakeoil.pem
            rm -f $CRAFT_OVERLAY/etc/ssl/private/ssl-cert-snakeoil.key
            # Generate dpkg.query
            mkdir -p $CRAFT_OVERLAY/usr/share/rocks
            echo "# os-release" > $CRAFT_OVERLAY/usr/share/rocks/dpkg.query
            echo "# dpkg-query" >> $CRAFT_OVERLAY/usr/share/rocks/dpkg.query
            declare -a fields
            fields+=('${db:Status-Abbrev}')
            fields+=('${binary:Package}')
            fields+=('${Version}')
            fields+=('${source:Package}')
            fields+=('${Source:Version}')
            printf -v dpkg_ops '%s,' "${fields[@]}"
            dpkg-query -W -f "${dpkg_ops}\n" --root=${CRAFT_OVERLAY} >> $CRAFT_OVERLAY/usr/share/rocks/dpkg.query
    rock-entrypoint:
        plugin: dump
        source: .
        source-type: local
        stage:
            - usr/local/bin/
        organize:
            scripts/entrypoint.sh: /usr/local/bin/entrypoint.sh
    rock-license:
        plugin: dump
        source: .
        source-type: local
        stage:
            - licenses/LICENSE-rock
        organize:
            LICENSE: licenses/LICENSE-rock
